spring:
  application:
    name: shiori-payment-service
  config:
    import:
      - optional:nacos:${spring.application.name}-base.yml?group=${NACOS_CONFIG_GROUP:SHIORI_DEV_DOCKER}&refreshEnabled=true
      - optional:nacos:${spring.application.name}-secret.yml?group=${NACOS_CONFIG_GROUP:SHIORI_DEV_DOCKER}&refreshEnabled=true
      - optional:nacos:shiori-security-base.yml?group=${NACOS_CONFIG_GROUP:SHIORI_DEV_DOCKER}&refreshEnabled=true
      - optional:nacos:shiori-security-secret.yml?group=${NACOS_CONFIG_GROUP:SHIORI_DEV_DOCKER}&refreshEnabled=true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:nacos:8848}
      config:
        server-addr: ${NACOS_ADDR:nacos:8848}
      username: ${NACOS_USERNAME}
      password: ${NACOS_PASSWORD}

server:
  port: 8084

payment:
  internal-api:
    token: ${ORDER_PAYMENT_INTERNAL_TOKEN:}
    require-token: ${PAYMENT_INTERNAL_API_REQUIRE_TOKEN:true}
  outbox:
    enabled: ${PAYMENT_OUTBOX_ENABLED:true}
    relay-fixed-delay-ms: ${PAYMENT_OUTBOX_RELAY_FIXED_DELAY_MS:3000}
    relay-batch-size: ${PAYMENT_OUTBOX_RELAY_BATCH_SIZE:100}
    max-backoff-seconds: ${PAYMENT_OUTBOX_MAX_BACKOFF_SECONDS:300}
  mq:
    enabled: ${PAYMENT_MQ_ENABLED:true}
    event-exchange: ${PAYMENT_EVENT_EXCHANGE:shiori.payment.event}
    wallet-balance-changed-routing-key: ${PAYMENT_WALLET_BALANCE_CHANGED_ROUTING_KEY:wallet.balance.changed}
  reconcile:
    enabled: ${PAYMENT_RECONCILE_ENABLED:true}
    cron: ${PAYMENT_RECONCILE_CRON:0 30 2 * * *}
    zone: ${PAYMENT_RECONCILE_ZONE:Asia/Shanghai}
    batch-size: ${PAYMENT_RECONCILE_BATCH_SIZE:500}
