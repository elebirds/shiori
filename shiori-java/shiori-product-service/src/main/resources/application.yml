spring:
  application:
    name: shiori-product-service
  config:
    import:
      - optional:nacos:${spring.application.name}-base.yml?group=${NACOS_CONFIG_GROUP:SHIORI_DEV_DOCKER}&refreshEnabled=true
      - optional:nacos:${spring.application.name}-secret.yml?group=${NACOS_CONFIG_GROUP:SHIORI_DEV_DOCKER}&refreshEnabled=true
      - optional:nacos:shiori-security-base.yml?group=${NACOS_CONFIG_GROUP:SHIORI_DEV_DOCKER}&refreshEnabled=true
      - optional:nacos:shiori-security-secret.yml?group=${NACOS_CONFIG_GROUP:SHIORI_DEV_DOCKER}&refreshEnabled=true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:nacos:8848}
      config:
        server-addr: ${NACOS_ADDR:nacos:8848}
      username: ${NACOS_USERNAME}
      password: ${NACOS_PASSWORD}

server:
  port: 8082

product:
  detail-cache:
    key-prefix: ${PRODUCT_DETAIL_CACHE_KEY_PREFIX:product:detail:v2:}
    ttl-seconds: ${PRODUCT_DETAIL_CACHE_TTL_SECONDS:120}
    null-ttl-seconds: ${PRODUCT_DETAIL_CACHE_NULL_TTL_SECONDS:15}
    ttl-jitter-seconds: ${PRODUCT_DETAIL_CACHE_TTL_JITTER_SECONDS:30}
    lock-ttl-millis: ${PRODUCT_DETAIL_CACHE_LOCK_TTL_MILLIS:3000}
    lock-wait-millis: ${PRODUCT_DETAIL_CACHE_LOCK_WAIT_MILLIS:40}
    lock-wait-attempts: ${PRODUCT_DETAIL_CACHE_LOCK_WAIT_ATTEMPTS:5}
  media-url-cache:
    enabled: ${PRODUCT_MEDIA_URL_CACHE_ENABLED:true}
    key-prefix: ${PRODUCT_MEDIA_URL_CACHE_KEY_PREFIX:product:media:url:}
    ttl-seconds: ${PRODUCT_MEDIA_URL_CACHE_TTL_SECONDS:180}
    safety-margin-seconds: ${PRODUCT_MEDIA_URL_CACHE_SAFETY_MARGIN_SECONDS:30}
  outbox:
    enabled: ${PRODUCT_OUTBOX_ENABLED:true}
  mq:
    event-exchange: ${PRODUCT_EVENT_EXCHANGE:shiori.product.event}
    product-published-routing-key: ${PRODUCT_PUBLISHED_ROUTING_KEY:product.published}
