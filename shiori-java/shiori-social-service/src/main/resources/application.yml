spring:
  application:
    name: shiori-social-service
  autoconfigure:
    exclude:
      - org.springframework.boot.micrometer.metrics.autoconfigure.export.otlp.OtlpMetricsExportAutoConfiguration
      - org.springframework.boot.opentelemetry.autoconfigure.logging.otlp.OtlpLoggingAutoConfiguration
  config:
    import:
      - optional:nacos:${spring.application.name}-base.yml?group=${NACOS_CONFIG_GROUP:SHIORI_DEV_DOCKER}&refreshEnabled=true
      - optional:nacos:${spring.application.name}-secret.yml?group=${NACOS_CONFIG_GROUP:SHIORI_DEV_DOCKER}&refreshEnabled=true
      - optional:nacos:shiori-security-base.yml?group=${NACOS_CONFIG_GROUP:SHIORI_DEV_DOCKER}&refreshEnabled=true
      - optional:nacos:shiori-security-secret.yml?group=${NACOS_CONFIG_GROUP:SHIORI_DEV_DOCKER}&refreshEnabled=true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:nacos:8848}
      config:
        server-addr: ${NACOS_ADDR:nacos:8848}
      username: ${NACOS_USERNAME}
      password: ${NACOS_PASSWORD}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
      auto-offset-reset: latest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    listener:
      missing-topics-fatal: false

server:
  port: 8085

social:
  kafka:
    enabled: ${SOCIAL_KAFKA_ENABLED:true}
    product-outbox-topic: ${SOCIAL_PRODUCT_OUTBOX_TOPIC:shiori.cdc.product.outbox.raw}
    product-outbox-group-id: ${SOCIAL_PRODUCT_OUTBOX_GROUP_ID:shiori-social-product-cdc}
    retry-initial-interval-ms: ${SOCIAL_KAFKA_RETRY_INITIAL_INTERVAL_MS:1000}
    retry-multiplier: ${SOCIAL_KAFKA_RETRY_MULTIPLIER:2.0}
    retry-max-interval-ms: ${SOCIAL_KAFKA_RETRY_MAX_INTERVAL_MS:8000}
    max-attempts: ${SOCIAL_KAFKA_MAX_ATTEMPTS:3}
    processing-timeout-ms: ${SOCIAL_KAFKA_PROCESSING_TIMEOUT_MS:300000}
    dlt-suffix: ${SOCIAL_KAFKA_DLT_SUFFIX:.dlt}

management:
  defaults:
    metrics:
      export:
        enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    enabled: ${TRACING_ENABLED:false}
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
    propagation:
      consume: [w3c]
      produce: [w3c]
  opentelemetry:
    resource-attributes:
      service.namespace: shiori
      deployment.environment: ${SHIORI_ENV:dev}
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://127.0.0.1:4318/v1/traces}
  otlp:
    metrics:
      export:
        enabled: false
  logging:
    export:
      otlp:
        enabled: false

logging:
  include-application-name: false
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "
