spring:
  application:
    name: shiori-order-service
  config:
    import:
      - optional:nacos:${spring.application.name}-base.yml?group=${NACOS_CONFIG_GROUP:SHIORI_DEV_DOCKER}&refreshEnabled=true
      - optional:nacos:${spring.application.name}-secret.yml?group=${NACOS_CONFIG_GROUP:SHIORI_DEV_DOCKER}&refreshEnabled=true
      - optional:nacos:shiori-security-base.yml?group=${NACOS_CONFIG_GROUP:SHIORI_DEV_DOCKER}&refreshEnabled=true
      - optional:nacos:shiori-security-secret.yml?group=${NACOS_CONFIG_GROUP:SHIORI_DEV_DOCKER}&refreshEnabled=true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:nacos:8848}
      config:
        server-addr: ${NACOS_ADDR:nacos:8848}
      username: ${NACOS_USERNAME}
      password: ${NACOS_PASSWORD}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
      auto-offset-reset: latest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    listener:
      missing-topics-fatal: false

server:
  port: 8083

order:
  timeout-minutes: ${ORDER_TIMEOUT_MINUTES:15}
  timeout-scheduler:
    enabled: ${ORDER_TIMEOUT_SCHEDULER_ENABLED:true}
    fixed-delay-ms: ${ORDER_TIMEOUT_SCHEDULER_FIXED_DELAY_MS:3000}
    batch-size: ${ORDER_TIMEOUT_SCHEDULER_BATCH_SIZE:100}
  kafka:
    enabled: ${ORDER_KAFKA_ENABLED:false}
    wallet-balance-outbox-topic: ${ORDER_WALLET_BALANCE_OUTBOX_TOPIC:shiori.cdc.payment.outbox.raw}
    wallet-balance-outbox-group-id: ${ORDER_WALLET_BALANCE_OUTBOX_GROUP_ID:shiori-order-wallet-cdc}
    retry-initial-interval-ms: ${ORDER_KAFKA_RETRY_INITIAL_INTERVAL_MS:1000}
    retry-multiplier: ${ORDER_KAFKA_RETRY_MULTIPLIER:2.0}
    retry-max-interval-ms: ${ORDER_KAFKA_RETRY_MAX_INTERVAL_MS:8000}
    max-attempts: ${ORDER_KAFKA_MAX_ATTEMPTS:3}
    processing-timeout-ms: ${ORDER_KAFKA_PROCESSING_TIMEOUT_MS:300000}
    dlt-suffix: ${ORDER_KAFKA_DLT_SUFFIX:.dlt}
  review:
    window-days: ${ORDER_REVIEW_WINDOW_DAYS:15}
    edit-hours: ${ORDER_REVIEW_EDIT_HOURS:24}
    comment-max-length: ${ORDER_REVIEW_COMMENT_MAX_LENGTH:280}
  product-client:
    service-base-url: ${ORDER_PRODUCT_SERVICE_BASE_URL:http://shiori-product-service}
  user-client:
    service-base-url: ${ORDER_USER_SERVICE_BASE_URL:http://shiori-user-service}
  payment-client:
    service-base-url: ${ORDER_PAYMENT_SERVICE_BASE_URL:http://shiori-payment-service}
    internal-token: ${ORDER_PAYMENT_INTERNAL_TOKEN:}
  notify-client:
    service-base-url: ${ORDER_NOTIFY_SERVICE_BASE_URL:http://shiori-notify-service}
  refund:
    review-sla-hours: ${ORDER_REFUND_REVIEW_SLA_HOURS:48}
    auto-approve-fixed-delay-ms: ${ORDER_REFUND_AUTO_APPROVE_FIXED_DELAY_MS:60000}
    auto-approve-batch-size: ${ORDER_REFUND_AUTO_APPROVE_BATCH_SIZE:100}
    retry-batch-size: ${ORDER_REFUND_RETRY_BATCH_SIZE:100}
  mq:
    event-exchange: ${ORDER_EVENT_EXCHANGE:shiori.order.event}
    order-created-routing-key: ${ORDER_CREATED_ROUTING_KEY:order.created}
    order-paid-routing-key: ${ORDER_PAID_ROUTING_KEY:order.paid}
    order-canceled-routing-key: ${ORDER_CANCELED_ROUTING_KEY:order.canceled}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
