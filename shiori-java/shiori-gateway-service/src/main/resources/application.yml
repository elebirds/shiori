spring:
  application:
    name: shiori-gateway-service
  config:
    import:
      - optional:nacos:${spring.application.name}-base.yml?group=${NACOS_CONFIG_GROUP:SHIORI_DEV_DOCKER}&refreshEnabled=true
      - optional:nacos:shiori-security-base.yml?group=${NACOS_CONFIG_GROUP:SHIORI_DEV_DOCKER}&refreshEnabled=true
      - optional:nacos:shiori-security-secret.yml?group=${NACOS_CONFIG_GROUP:SHIORI_DEV_DOCKER}&refreshEnabled=true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:nacos:8848}
      config:
        server-addr: ${NACOS_ADDR:nacos:8848}
      username: ${NACOS_USERNAME}
      password: ${NACOS_PASSWORD}
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://shiori-user-service
              predicates:
                - Path=/api/user/**
            - id: admin-user-service
              uri: lb://shiori-user-service
              predicates:
                - Path=/api/admin/users/**
            - id: admin-role-service
              uri: lb://shiori-user-service
              predicates:
                - Path=/api/admin/roles/**
            - id: product-service
              uri: lb://shiori-product-service
              predicates:
                - Path=/api/product/**
            - id: product-service-v2
              uri: lb://shiori-product-service
              predicates:
                - Path=/api/v2/product/**
            - id: admin-product-service
              uri: lb://shiori-product-service
              predicates:
                - Path=/api/admin/products/**
            - id: admin-product-service-v2
              uri: lb://shiori-product-service
              predicates:
                - Path=/api/v2/admin/products/**
            - id: order-service
              uri: lb://shiori-order-service
              predicates:
                - Path=/api/order/**
            - id: order-service-v2
              uri: lb://shiori-order-service
              predicates:
                - Path=/api/v2/order/**
            - id: admin-order-service
              uri: lb://shiori-order-service
              predicates:
                - Path=/api/admin/orders/**
            - id: admin-order-service-v2
              uri: lb://shiori-order-service
              predicates:
                - Path=/api/v2/admin/orders/**
            - id: notify-service
              uri: ${notify.base-url:http://shiori-notify-service:8090}
              predicates:
                - Path=/api/notify/**
            - id: chat-service
              uri: ${notify.base-url:http://shiori-notify-service:8090}
              predicates:
                - Path=/api/chat/**
            - id: notify-ws
              uri: ${notify.ws-base-url:ws://shiori-notify-service:8090}
              predicates:
                - Path=/ws

security:
  auth:
    whitelist:
      - /actuator/health/**
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /api/user/auth/register
      - /api/user/auth/login
      - /api/user/auth/refresh
      - /api/user/auth/logout
    anonymous-get-paths:
      - /api/product/**
      - /api/v2/product/**
      - /api/user/profiles/**
      - /api/user/media/avatar/**
      - /api/v2/product/users/**

server:
  port: 8080
