spring:
  application:
    name: shiori-gateway-service
  config:
    import:
      - optional:nacos:${spring.application.name}.yml?group=DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:shiori-security.yml?group=DEFAULT_GROUP&refreshEnabled=true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:nacos:8848}
      config:
        server-addr: ${NACOS_ADDR:nacos:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://shiori-user-service
              predicates:
                - Path=/api/user/**
            - id: admin-user-service
              uri: lb://shiori-user-service
              predicates:
                - Path=/api/admin/users/**
            - id: admin-role-service
              uri: lb://shiori-user-service
              predicates:
                - Path=/api/admin/roles/**
            - id: product-service
              uri: lb://shiori-product-service
              predicates:
                - Path=/api/product/**
            - id: admin-product-service
              uri: lb://shiori-product-service
              predicates:
                - Path=/api/admin/products/**
            - id: order-service
              uri: lb://shiori-order-service
              predicates:
                - Path=/api/order/**
            - id: admin-order-service
              uri: lb://shiori-order-service
              predicates:
                - Path=/api/admin/orders/**

security:
  jwt:
    hmac-secret: ${JWT_HMAC_SECRET:change-me-in-nacos-change-me-in-nacos}
    issuer: ${JWT_ISSUER:shiori}
    access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:900}
    refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:604800}
  auth:
    whitelist:
      - /actuator/health/**
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /api/user/auth/register
      - /api/user/auth/login
      - /api/user/auth/refresh
      - /api/user/auth/logout
    anonymous-get-paths:
      - /api/product/**
  gateway-sign:
    internal-secret: ${GATEWAY_SIGN_SECRET:change-me-internal-sign-secret-change-me}
    max-skew-seconds: ${GATEWAY_SIGN_MAX_SKEW_SECONDS:300}

server:
  port: 8080
