spring:
  application:
    name: shiori-gateway-service
  config:
    import:
      - optional:nacos:${spring.application.name}-base.yml?group=${NACOS_CONFIG_GROUP:SHIORI_DEV_DOCKER}&refreshEnabled=true
      - optional:nacos:shiori-security-base.yml?group=${NACOS_CONFIG_GROUP:SHIORI_DEV_DOCKER}&refreshEnabled=true
      - optional:nacos:shiori-security-secret.yml?group=${NACOS_CONFIG_GROUP:SHIORI_DEV_DOCKER}&refreshEnabled=true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:nacos:8848}
      config:
        server-addr: ${NACOS_ADDR:nacos:8848}
      username: ${NACOS_USERNAME}
      password: ${NACOS_PASSWORD}
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://shiori-user-service
              predicates:
                - Path=/api/user/**
            - id: admin-user-service
              uri: lb://shiori-user-service
              predicates:
                - Path=/api/admin/users/**
            - id: admin-user-service-v2
              uri: lb://shiori-user-service
              predicates:
                - Path=/api/v2/admin/users/**
            - id: admin-permission-service-v2
              uri: lb://shiori-user-service
              predicates:
                - Path=/api/v2/admin/permissions/**
            - id: admin-role-service
              uri: lb://shiori-user-service
              predicates:
                - Path=/api/admin/roles/**
            - id: product-service-v2
              uri: lb://shiori-product-service
              predicates:
                - Path=/api/v2/product/**
            - id: admin-product-service-v2
              uri: lb://shiori-product-service
              predicates:
                - Path=/api/v2/admin/products/**
            - id: order-service-v2
              uri: lb://shiori-order-service
              predicates:
                - Path=/api/v2/order/**
            - id: admin-order-service-v2
              uri: lb://shiori-order-service
              predicates:
                - Path=/api/v2/admin/orders/**
            - id: payment-service-v2
              uri: lb://shiori-payment-service
              predicates:
                - Path=/api/v2/payment/**
            - id: admin-payment-service-v2
              uri: lb://shiori-payment-service
              predicates:
                - Path=/api/v2/admin/payments/**
            - id: notify-service
              uri: lb://shiori-notify-service
              predicates:
                - Path=/api/notify/**
            - id: chat-service
              uri: lb://shiori-notify-service
              predicates:
                - Path=/api/chat/**
            - id: admin-chat-service
              uri: lb://shiori-notify-service
              predicates:
                - Path=/api/admin/chat/**
            - id: notify-ws
              uri: lb:ws://shiori-notify-service
              predicates:
                - Path=/ws

security:
  auth:
    whitelist:
      - /actuator/health/**
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /api/user/auth/register
      - /api/user/auth/login
      - /api/user/auth/refresh
      - /api/user/auth/logout
    anonymous-get-paths:
      - /api/v2/product/**
      - /api/user/profiles/**
      - /api/user/media/avatar/**
      - /api/v2/product/users/**
      - /api/v2/order/reviews/users/**
  authz:
    enabled: ${SECURITY_AUTHZ_ENABLED:true}
    user-service-base-url: ${SECURITY_AUTHZ_USER_SERVICE_BASE_URL:http://shiori-user-service}
    query-timeout-ms: ${SECURITY_AUTHZ_QUERY_TIMEOUT_MS:800}
    cache:
      ttl-seconds: ${SECURITY_AUTHZ_CACHE_TTL_SECONDS:30}
      stale-ttl-seconds: ${SECURITY_AUTHZ_CACHE_STALE_TTL_SECONDS:300}
      redis:
        enabled: ${SECURITY_AUTHZ_CACHE_REDIS_ENABLED:true}
        key-prefix: ${SECURITY_AUTHZ_CACHE_REDIS_KEY_PREFIX:authz:snapshot:}
        ttl-seconds: ${SECURITY_AUTHZ_CACHE_REDIS_TTL_SECONDS:30}
        stale-ttl-seconds: ${SECURITY_AUTHZ_CACHE_REDIS_STALE_TTL_SECONDS:300}
    degrade:
      allow-without-snapshot: ${SECURITY_AUTHZ_DEGRADE_ALLOW_WITHOUT_SNAPSHOT:true}
    event:
      enabled: ${SECURITY_AUTHZ_EVENT_ENABLED:true}
      redis-channel: ${SECURITY_AUTHZ_EVENT_REDIS_CHANNEL:shiori.authz.user.changed}
    route-rules:
      - method: GET
        path-pattern: /api/chat/**
        permission-code: chat.read
      - method: POST
        path-pattern: /api/chat/**
        permission-code: chat.send
      - method: PUT
        path-pattern: /api/chat/**
        permission-code: chat.send
      - method: DELETE
        path-pattern: /api/chat/**
        permission-code: chat.send
      - method: GET
        path-pattern: /ws
        permission-code: chat.read
      - method: POST
        path-pattern: /api/v2/order/orders
        permission-code: order.create
      - method: POST
        path-pattern: /api/v2/order/orders/*/pay
        permission-code: order.pay
      - method: GET
        path-pattern: /api/v2/payment/wallet/**
        permission-code: payment.wallet.read
      - method: POST
        path-pattern: /api/v2/payment/cdks/redeem
        permission-code: payment.cdk.redeem
      - method: POST
        path-pattern: /api/v2/admin/payments/**
        permission-code: payment.cdk.manage
      - method: POST
        path-pattern: /api/v2/order/orders/*/cancel
        permission-code: order.cancel
      - method: POST
        path-pattern: /api/v2/order/orders/*/confirm-receipt
        permission-code: order.confirm_receipt
      - method: POST
        path-pattern: /api/v2/order/orders/*/reviews
        permission-code: order.review.create
      - method: PUT
        path-pattern: /api/v2/order/orders/*/reviews/me
        permission-code: order.review.update
      - method: POST
        path-pattern: /api/v2/order/seller/orders/*/deliver
        permission-code: order.deliver
      - method: POST
        path-pattern: /api/v2/order/seller/orders/*/finish
        permission-code: order.finish
      - method: POST
        path-pattern: /api/v2/admin/orders/*/cancel
        permission-code: order.cancel
      - method: POST
        path-pattern: /api/v2/admin/orders/*/deliver
        permission-code: order.deliver
      - method: POST
        path-pattern: /api/v2/admin/orders/*/finish
        permission-code: order.finish
      - method: GET
        path-pattern: /api/v2/admin/orders/reviews
        permission-code: order.review.moderate
      - method: POST
        path-pattern: /api/v2/admin/orders/reviews/*/visibility
        permission-code: order.review.moderate
      - method: POST
        path-pattern: /api/v2/product/products
        permission-code: product.create
      - method: PUT
        path-pattern: /api/v2/product/products/*
        permission-code: product.update
      - method: POST
        path-pattern: /api/v2/product/products/*/publish
        permission-code: product.publish
      - method: POST
        path-pattern: /api/v2/product/products/*/off-shelf
        permission-code: product.off_shelf
      - method: POST
        path-pattern: /api/v2/admin/products/*/off-shelf
        permission-code: product.off_shelf
      - method: POST
        path-pattern: /api/v2/admin/products/batch-off-shelf
        permission-code: product.off_shelf
      - method: POST
        path-pattern: /api/v2/product/internal/stock/**
        permission-code: product.stock.adjust
      - method: '*'
        path-pattern: /api/v2/admin/users/*/permission-overrides/**
        permission-code: admin.user.permission_override.manage
      - method: GET
        path-pattern: /api/v2/admin/permissions/**
        permission-code: admin.user.permission_override.manage

server:
  port: 8080
