name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  java-test:
    name: java-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Run Java tests
        working-directory: shiori-java
        run: ./gradlew clean test --no-daemon

  e2e-trade-notify:
    name: e2e-trade-notify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: java-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: shiori-notify/go.mod
          cache-dependency-path: shiori-notify/go.sum

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: shiori-app/pnpm-lock.yaml

      - name: Check runtime dependencies
        run: |
          docker --version
          docker compose version
          jq --version
          curl --version | head -n 1
          go version
          node --version
          pnpm --version

      - name: Run E2E smoke
        run: bash scripts/ci/run_e2e_ci.sh

      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-logs/**
          if-no-files-found: warn

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            shiori-app/playwright-report/**
            shiori-app/test-results/**
          if-no-files-found: warn
