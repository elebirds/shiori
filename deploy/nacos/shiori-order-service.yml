spring:
  datasource:
    url: jdbc:mysql://mysql:3306/shiori_order?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: shiori
    password: shiori
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: shiori
    password: shiori
    virtual-host: /

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

order:
  timeout-minutes: 15
  product-client:
    service-base-url: http://shiori-product-service
  outbox:
    enabled: true
    relay-fixed-delay-ms: 3000
    relay-batch-size: 100
    max-backoff-seconds: 300
  mq:
    enabled: true
    event-exchange: shiori.order.event
    order-created-routing-key: order.created
    order-paid-routing-key: order.paid
    order-canceled-routing-key: order.canceled
    delay-exchange: shiori.order.delay
    delay-routing-key: order.timeout
    timeout-dlx-exchange: shiori.order.timeout.dlx
    timeout-delay-queue: q.order.timeout.delay
    timeout-consume-queue: q.order.timeout.consume
    timeout-ttl-ms: 900000
