      nacos:
        condition: service_started
      nacos-config-init:
        condition: service_completed_successfully
      shiori-user-service:
        condition: service_started
      shiori-product-service:
        condition: service_started
      shiori-order-service:
        condition: service_started
      shiori-payment-service:
        condition: service_started
      shiori-social-service:
        condition: service_started
