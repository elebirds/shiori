services:
  mysql:
    image: mysql:8.4
    container_name: shiori-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?missing}
      MYSQL_OPS_USERNAME: ${MYSQL_OPS_USERNAME:?missing}
      MYSQL_OPS_PASSWORD: ${MYSQL_OPS_PASSWORD:?missing}
      USER_DB_USERNAME: ${USER_DB_USERNAME:?missing}
      USER_DB_PASSWORD: ${USER_DB_PASSWORD:?missing}
      PRODUCT_DB_USERNAME: ${PRODUCT_DB_USERNAME:?missing}
      PRODUCT_DB_PASSWORD: ${PRODUCT_DB_PASSWORD:?missing}
      ORDER_DB_USERNAME: ${ORDER_DB_USERNAME:?missing}
      ORDER_DB_PASSWORD: ${ORDER_DB_PASSWORD:?missing}
      NOTIFY_DB_USERNAME: ${NOTIFY_DB_USERNAME:?missing}
      NOTIFY_DB_PASSWORD: ${NOTIFY_DB_PASSWORD:?missing}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/mysql-init:/docker-entrypoint-initdb.d:ro
    networks:
      - shiori-net

  redis:
    image: redis:7.4-alpine
    container_name: shiori-redis
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    networks:
      - shiori-net

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: shiori-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:?missing}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?missing}
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - shiori-net

  rabbitmq-auth-init:
    image: curlimages/curl:8.12.1
    container_name: shiori-rabbitmq-auth-init
    depends_on:
      rabbitmq:
        condition: service_started
    environment:
      RABBITMQ_API_URL: http://rabbitmq:15672
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:?missing}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?missing}
      ORDER_RMQ_USERNAME: ${ORDER_RMQ_USERNAME:?missing}
      ORDER_RMQ_PASSWORD: ${ORDER_RMQ_PASSWORD:?missing}
      USER_RMQ_USERNAME: ${USER_RMQ_USERNAME:?missing}
      USER_RMQ_PASSWORD: ${USER_RMQ_PASSWORD:?missing}
      NOTIFY_RMQ_USERNAME: ${NOTIFY_RMQ_USERNAME:?missing}
      NOTIFY_RMQ_PASSWORD: ${NOTIFY_RMQ_PASSWORD:?missing}
    volumes:
      - ./rabbitmq:/deploy/rabbitmq:ro
    entrypoint: ["/bin/sh", "/deploy/rabbitmq/init-rabbitmq-users.sh"]
    restart: "no"
    networks:
      - shiori-net

  nacos:
    image: nacos/nacos-server:v3.1.1
    container_name: shiori-nacos
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN:?missing}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY:?missing}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE:?missing}
      NACOS_AUTH_CACHE_ENABLE: "true"
    ports:
      - "8848:8848"
      - "${NACOS_CONSOLE_PORT:-18080}:8080"
      - "9848:9848"
      - "9849:9849"
    networks:
      - shiori-net

  nacos-config-init:
    image: curlimages/curl:8.12.1
    container_name: shiori-nacos-config-init
    depends_on:
      nacos:
        condition: service_started
    environment:
      NACOS_URL: http://nacos:8848
      SHIORI_ENV: ${SHIORI_ENV:-dev}
      NACOS_CONFIG_GROUP: ${NACOS_CONFIG_GROUP:-}
      NACOS_CONFIG_NAMESPACE: ${NACOS_CONFIG_NAMESPACE:-}
      NACOS_IMPORT_USERNAME: ${NACOS_IMPORT_USERNAME:?missing}
      NACOS_IMPORT_PASSWORD: ${NACOS_IMPORT_PASSWORD:?missing}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY:?missing}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE:?missing}
      USER_DB_URL: ${USER_DB_URL_DOCKER:-jdbc:mysql://mysql:3306/shiori_user?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
      USER_DB_USERNAME: ${USER_DB_USERNAME:?missing}
      USER_DB_PASSWORD: ${USER_DB_PASSWORD:?missing}
      PRODUCT_DB_URL: ${PRODUCT_DB_URL_DOCKER:-jdbc:mysql://mysql:3306/shiori_product?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
      PRODUCT_DB_USERNAME: ${PRODUCT_DB_USERNAME:?missing}
      PRODUCT_DB_PASSWORD: ${PRODUCT_DB_PASSWORD:?missing}
      ORDER_DB_URL: ${ORDER_DB_URL_DOCKER:-jdbc:mysql://mysql:3306/shiori_order?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
      ORDER_DB_USERNAME: ${ORDER_DB_USERNAME:?missing}
      ORDER_DB_PASSWORD: ${ORDER_DB_PASSWORD:?missing}
      REDIS_HOST: ${REDIS_HOST_DOCKER:-redis}
      REDIS_PORT: ${REDIS_PORT_DOCKER:-6379}
      ORDER_RMQ_HOST: ${ORDER_RMQ_HOST_DOCKER:-rabbitmq}
      ORDER_RMQ_PORT: ${ORDER_RMQ_PORT_DOCKER:-5672}
      ORDER_RMQ_USERNAME: ${ORDER_RMQ_USERNAME:?missing}
      ORDER_RMQ_PASSWORD: ${ORDER_RMQ_PASSWORD:?missing}
      USER_RMQ_HOST: ${USER_RMQ_HOST_DOCKER:-rabbitmq}
      USER_RMQ_PORT: ${USER_RMQ_PORT_DOCKER:-5672}
      USER_RMQ_USERNAME: ${USER_RMQ_USERNAME:?missing}
      USER_RMQ_PASSWORD: ${USER_RMQ_PASSWORD:?missing}
      PRODUCT_OSS_ENDPOINT: ${PRODUCT_OSS_ENDPOINT_DOCKER:-http://minio:9000}
      ORDER_PRODUCT_SERVICE_BASE_URL: ${ORDER_PRODUCT_SERVICE_BASE_URL_DOCKER:-http://shiori-product-service}
      MINIO_PRODUCT_ACCESS_KEY: ${MINIO_PRODUCT_ACCESS_KEY:?missing}
      MINIO_PRODUCT_SECRET_KEY: ${MINIO_PRODUCT_SECRET_KEY:?missing}
      JWT_HMAC_SECRET: ${JWT_HMAC_SECRET:?missing}
      GATEWAY_SIGN_SECRET: ${GATEWAY_SIGN_SECRET:?missing}
    volumes:
      - ./nacos:/deploy/nacos:ro
    entrypoint: ["/bin/sh", "/deploy/nacos/import-nacos-configs.sh"]
    restart: "no"
    networks:
      - shiori-net

  nacos-config-init-local:
    image: curlimages/curl:8.12.1
    container_name: shiori-nacos-config-init-local
    depends_on:
      nacos:
        condition: service_started
    environment:
      NACOS_URL: http://nacos:8848
      SHIORI_ENV: dev
      NACOS_CONFIG_GROUP: ${NACOS_CONFIG_GROUP_LOCAL:-SHIORI_DEV_LOCAL}
      NACOS_CONFIG_NAMESPACE: ${NACOS_CONFIG_NAMESPACE:-}
      NACOS_IMPORT_USERNAME: ${NACOS_IMPORT_USERNAME:?missing}
      NACOS_IMPORT_PASSWORD: ${NACOS_IMPORT_PASSWORD:?missing}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY:?missing}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE:?missing}
      USER_DB_URL: ${USER_DB_URL_LOCAL:-jdbc:mysql://127.0.0.1:3306/shiori_user?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
      USER_DB_USERNAME: ${USER_DB_USERNAME:?missing}
      USER_DB_PASSWORD: ${USER_DB_PASSWORD:?missing}
      PRODUCT_DB_URL: ${PRODUCT_DB_URL_LOCAL:-jdbc:mysql://127.0.0.1:3306/shiori_product?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
      PRODUCT_DB_USERNAME: ${PRODUCT_DB_USERNAME:?missing}
      PRODUCT_DB_PASSWORD: ${PRODUCT_DB_PASSWORD:?missing}
      ORDER_DB_URL: ${ORDER_DB_URL_LOCAL:-jdbc:mysql://127.0.0.1:3306/shiori_order?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
      ORDER_DB_USERNAME: ${ORDER_DB_USERNAME:?missing}
      ORDER_DB_PASSWORD: ${ORDER_DB_PASSWORD:?missing}
      REDIS_HOST: ${REDIS_HOST_LOCAL:-127.0.0.1}
      REDIS_PORT: ${REDIS_PORT_LOCAL:-6379}
      ORDER_RMQ_HOST: ${ORDER_RMQ_HOST_LOCAL:-127.0.0.1}
      ORDER_RMQ_PORT: ${ORDER_RMQ_PORT_LOCAL:-5672}
      ORDER_RMQ_USERNAME: ${ORDER_RMQ_USERNAME:?missing}
      ORDER_RMQ_PASSWORD: ${ORDER_RMQ_PASSWORD:?missing}
      USER_RMQ_HOST: ${USER_RMQ_HOST_LOCAL:-127.0.0.1}
      USER_RMQ_PORT: ${USER_RMQ_PORT_LOCAL:-5672}
      USER_RMQ_USERNAME: ${USER_RMQ_USERNAME:?missing}
      USER_RMQ_PASSWORD: ${USER_RMQ_PASSWORD:?missing}
      PRODUCT_OSS_ENDPOINT: ${PRODUCT_OSS_ENDPOINT_LOCAL:-http://127.0.0.1:9000}
      ORDER_PRODUCT_SERVICE_BASE_URL: ${ORDER_PRODUCT_SERVICE_BASE_URL_LOCAL:-http://shiori-product-service}
      MINIO_PRODUCT_ACCESS_KEY: ${MINIO_PRODUCT_ACCESS_KEY:?missing}
      MINIO_PRODUCT_SECRET_KEY: ${MINIO_PRODUCT_SECRET_KEY:?missing}
      JWT_HMAC_SECRET: ${JWT_HMAC_SECRET:?missing}
      GATEWAY_SIGN_SECRET: ${GATEWAY_SIGN_SECRET:?missing}
    volumes:
      - ./nacos:/deploy/nacos:ro
    entrypoint: ["/bin/sh", "/deploy/nacos/import-nacos-configs.sh"]
    restart: "no"
    networks:
      - shiori-net

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: shiori-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?missing}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?missing}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - shiori-net

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
    container_name: shiori-minio-init
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?missing}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?missing}
      MINIO_PRODUCT_BUCKET: ${MINIO_PRODUCT_BUCKET:-shiori-product}
      MINIO_PRODUCT_ACCESS_KEY: ${MINIO_PRODUCT_ACCESS_KEY:?missing}
      MINIO_PRODUCT_SECRET_KEY: ${MINIO_PRODUCT_SECRET_KEY:?missing}
    entrypoint:
      - /bin/sh
      - -c
      - |
        i=0
        until /usr/bin/mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" >/dev/null 2>&1; do
          i=$$((i + 1))
          if [ "$$i" -ge 60 ]; then
            echo "minio-init: 等待 MinIO 就绪超时"
            exit 1
          fi
          sleep 2
        done
        /usr/bin/mc mb --ignore-existing "local/$${MINIO_PRODUCT_BUCKET}"
        /usr/bin/mc anonymous set none "local/$${MINIO_PRODUCT_BUCKET}"
        cat >/tmp/policy-product-rw.json <<EOF
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Action": [
                "s3:GetObject",
                "s3:PutObject",
                "s3:DeleteObject",
                "s3:ListBucket"
              ],
              "Resource": [
                "arn:aws:s3:::$${MINIO_PRODUCT_BUCKET}",
                "arn:aws:s3:::$${MINIO_PRODUCT_BUCKET}/*"
              ]
            }
          ]
        }
        EOF
        /usr/bin/mc admin policy create local shiori-product-rw /tmp/policy-product-rw.json || true
        /usr/bin/mc admin user add local "$${MINIO_PRODUCT_ACCESS_KEY}" "$${MINIO_PRODUCT_SECRET_KEY}" || true
        /usr/bin/mc admin policy attach local shiori-product-rw --user "$${MINIO_PRODUCT_ACCESS_KEY}"
        exit 0
    restart: "no"
    networks:
      - shiori-net

  shiori-user-service:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: shiori-java/shiori-user-service/Dockerfile
    container_name: shiori-user-service
    environment:
      NACOS_ADDR: nacos:8848
      NACOS_USERNAME: ${NACOS_IMPORT_USERNAME:?missing}
      NACOS_PASSWORD: ${NACOS_IMPORT_PASSWORD:?missing}
      NACOS_CONFIG_GROUP: ${NACOS_CONFIG_GROUP:-SHIORI_DEV_DOCKER}
      SHIORI_ENV: ${SHIORI_ENV:-dev}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started
      nacos:
        condition: service_started
      nacos-config-init:
        condition: service_completed_successfully
    ports:
      - "8081:8081"
    restart: unless-stopped
    networks:
      - shiori-net

  shiori-product-service:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: shiori-java/shiori-product-service/Dockerfile
    container_name: shiori-product-service
    environment:
      NACOS_ADDR: nacos:8848
      NACOS_USERNAME: ${NACOS_IMPORT_USERNAME:?missing}
      NACOS_PASSWORD: ${NACOS_IMPORT_PASSWORD:?missing}
      NACOS_CONFIG_GROUP: ${NACOS_CONFIG_GROUP:-SHIORI_DEV_DOCKER}
      SHIORI_ENV: ${SHIORI_ENV:-dev}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_started
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      nacos:
        condition: service_started
      nacos-config-init:
        condition: service_completed_successfully
    ports:
      - "8082:8082"
    restart: unless-stopped
    networks:
      - shiori-net

  shiori-order-service:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: shiori-java/shiori-order-service/Dockerfile
    container_name: shiori-order-service
    environment:
      NACOS_ADDR: nacos:8848
      NACOS_USERNAME: ${NACOS_IMPORT_USERNAME:?missing}
      NACOS_PASSWORD: ${NACOS_IMPORT_PASSWORD:?missing}
      NACOS_CONFIG_GROUP: ${NACOS_CONFIG_GROUP:-SHIORI_DEV_DOCKER}
      SHIORI_ENV: ${SHIORI_ENV:-dev}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      ORDER_PRODUCT_SERVICE_BASE_URL: http://shiori-product-service
    depends_on:
      mysql:
        condition: service_started
      rabbitmq:
        condition: service_started
      rabbitmq-auth-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
      nacos:
        condition: service_started
      nacos-config-init:
        condition: service_completed_successfully
      shiori-product-service:
        condition: service_started
    ports:
      - "8083:8083"
    restart: unless-stopped
    networks:
      - shiori-net

  shiori-gateway-service:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: shiori-java/shiori-gateway-service/Dockerfile
    container_name: shiori-gateway-service
    environment:
      NACOS_ADDR: nacos:8848
      NACOS_USERNAME: ${NACOS_IMPORT_USERNAME:?missing}
      NACOS_PASSWORD: ${NACOS_IMPORT_PASSWORD:?missing}
      NACOS_CONFIG_GROUP: ${NACOS_CONFIG_GROUP:-SHIORI_DEV_DOCKER}
      SHIORI_ENV: ${SHIORI_ENV:-dev}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_started
      nacos:
        condition: service_started
      nacos-config-init:
        condition: service_completed_successfully
      shiori-user-service:
        condition: service_started
      shiori-product-service:
        condition: service_started
      shiori-order-service:
        condition: service_started
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - shiori-net

  shiori-notify-service:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: shiori-notify/Dockerfile
    container_name: shiori-notify-service
    environment:
      NOTIFY_HTTP_ADDR: :8090
      NOTIFY_STORE_DRIVER: mysql
      NOTIFY_MYSQL_DSN: ${NOTIFY_DB_USERNAME:?missing}:${NOTIFY_DB_PASSWORD:?missing}@tcp(mysql:3306)/${NOTIFY_DB_NAME_DOCKER:-shiori_notify}?charset=utf8mb4&parseTime=true&loc=UTC
      NOTIFY_AUTH_ENABLED: "true"
      NOTIFY_JWT_HMAC_SECRET: ${NOTIFY_JWT_HMAC_SECRET:?missing}
      NOTIFY_JWT_ISSUER: ${NOTIFY_JWT_ISSUER:-shiori}
      RABBITMQ_ADDR: amqp://${NOTIFY_RMQ_USERNAME:?missing}:${NOTIFY_RMQ_PASSWORD:?missing}@rabbitmq:5672/
      RABBITMQ_EXCHANGES: shiori.order.event,shiori.user.event
      RABBITMQ_ROUTING_KEYS: order.created,order.paid,order.canceled,order.delivered,order.finished,user.status.changed,user.role.changed,user.password.reset
    depends_on:
      mysql:
        condition: service_started
      rabbitmq:
        condition: service_started
      rabbitmq-auth-init:
        condition: service_completed_successfully
    ports:
      - "8090:8090"
    restart: unless-stopped
    networks:
      - shiori-net

  shiori-app:
    profiles: ["web"]
    build:
      context: ..
      dockerfile: shiori-app/Dockerfile
      args:
        VITE_API_BASE_URL: /
        VITE_NOTIFY_WS_BASE_URL: /ws
    container_name: shiori-app
    depends_on:
      - shiori-gateway-service
      - shiori-notify-service
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - shiori-net

  shiori-admin-web:
    profiles: ["web"]
    build:
      context: ..
      dockerfile: shiori-admin-web/Dockerfile
      args:
        VITE_API_BASE_URL: /
    container_name: shiori-admin-web
    depends_on:
      - shiori-gateway-service
    ports:
      - "3001:80"
    restart: unless-stopped
    networks:
      - shiori-net

  prometheus:
    profiles: ["obs"]
    image: prom/prometheus:v2.54.1
    container_name: shiori-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped
    networks:
      - shiori-net

  grafana:
    profiles: ["obs"]
    image: grafana/grafana:10.4.5
    container_name: shiori-grafana
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "${GRAFANA_HOST_PORT:-3002}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped
    networks:
      - shiori-net

networks:
  shiori-net:
    driver: bridge

volumes:
  mysql-data:
  minio-data:
  prometheus-data:
  grafana-data:
