services:
  mysql:
    image: mysql:8.4
    container_name: shiori-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?missing}
      MYSQL_OPS_USERNAME: ${MYSQL_OPS_USERNAME:?missing}
      MYSQL_OPS_PASSWORD: ${MYSQL_OPS_PASSWORD:?missing}
      CDC_DB_USERNAME: ${CDC_DB_USERNAME:-debezium}
      CDC_DB_PASSWORD: ${CDC_DB_PASSWORD:-debezium_cdc_password}
      USER_DB_USERNAME: ${USER_DB_USERNAME:?missing}
      USER_DB_PASSWORD: ${USER_DB_PASSWORD:?missing}
      PRODUCT_DB_USERNAME: ${PRODUCT_DB_USERNAME:?missing}
      PRODUCT_DB_PASSWORD: ${PRODUCT_DB_PASSWORD:?missing}
      ORDER_DB_USERNAME: ${ORDER_DB_USERNAME:?missing}
      ORDER_DB_PASSWORD: ${ORDER_DB_PASSWORD:?missing}
      PAYMENT_DB_USERNAME: ${PAYMENT_DB_USERNAME:?missing}
      PAYMENT_DB_PASSWORD: ${PAYMENT_DB_PASSWORD:?missing}
      NOTIFY_DB_USERNAME: ${NOTIFY_DB_USERNAME:?missing}
      NOTIFY_DB_PASSWORD: ${NOTIFY_DB_PASSWORD:?missing}
      SOCIAL_DB_USERNAME: ${SOCIAL_DB_USERNAME:?missing}
      SOCIAL_DB_PASSWORD: ${SOCIAL_DB_PASSWORD:?missing}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d:ro
      - ./sql/mysql-init:/docker-entrypoint-initdb.d:ro
    networks:
      - shiori-net

  redis:
    image: redis:7.4-alpine
    container_name: shiori-redis
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    networks:
      - shiori-net

  kafka:
    image: apache/kafka:4.0.1
    container_name: shiori-kafka
    environment:
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://127.0.0.1:${KAFKA_HOST_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    restart: unless-stopped
    networks:
      - shiori-net

  kafka-connect:
    image: quay.io/debezium/connect:3.3
    container_name: shiori-kafka-connect
    depends_on:
      kafka:
        condition: service_started
      mysql:
        condition: service_started
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: shiori_connect_configs
      OFFSET_STORAGE_TOPIC: shiori_connect_offsets
      STATUS_STORAGE_TOPIC: shiori_connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_LOG4J_ROOT_LOGLEVEL: INFO
    ports:
      - "${KAFKA_CONNECT_HOST_PORT:-18083}:8083"
    restart: unless-stopped
    networks:
      - shiori-net

  kafka-connect-init:
    image: curlimages/curl:8.12.1
    container_name: shiori-kafka-connect-init
    depends_on:
      kafka-connect:
        condition: service_started
    environment:
      KAFKA_CONNECT_URL: http://kafka-connect:8083
      CDC_DB_USERNAME: ${CDC_DB_USERNAME:-debezium}
      CDC_DB_PASSWORD: ${CDC_DB_PASSWORD:-debezium_cdc_password}
    volumes:
      - ./kafka/connect:/deploy/kafka/connect:ro
    entrypoint: ["/bin/sh", "/deploy/kafka/connect/register-connectors.sh"]
    restart: "no"
    networks:
      - shiori-net

  elasticsearch:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: deploy/elasticsearch/Dockerfile
      args:
        ELASTICSEARCH_VERSION: ${ELASTICSEARCH_VERSION:-8.17.2}
    container_name: shiori-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "${ELASTICSEARCH_HOST_PORT:-9200}:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    restart: unless-stopped
    networks:
      - shiori-net

  nacos:
    image: nacos/nacos-server:v3.1.1
    container_name: shiori-nacos
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN:?missing}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY:?missing}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE:?missing}
      NACOS_AUTH_CACHE_ENABLE: "true"
    ports:
      - "8848:8848"
      - "${NACOS_CONSOLE_PORT:-18080}:8080"
      - "9848:9848"
      - "9849:9849"
    networks:
      - shiori-net

  nacos-config-init:
    image: curlimages/curl:8.12.1
    container_name: shiori-nacos-config-init
    depends_on:
      nacos:
        condition: service_started
    environment:
      NACOS_URL: http://nacos:8848
      SHIORI_ENV: ${SHIORI_ENV:-dev}
      NACOS_CONFIG_GROUP: ${NACOS_CONFIG_GROUP:-}
      NACOS_CONFIG_NAMESPACE: ${NACOS_CONFIG_NAMESPACE:-}
      NACOS_IMPORT_USERNAME: ${NACOS_IMPORT_USERNAME:?missing}
      NACOS_IMPORT_PASSWORD: ${NACOS_IMPORT_PASSWORD:?missing}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY:?missing}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE:?missing}
      USER_DB_URL: ${USER_DB_URL_DOCKER:-jdbc:mysql://mysql:3306/shiori_user?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
      USER_DB_USERNAME: ${USER_DB_USERNAME:?missing}
      USER_DB_PASSWORD: ${USER_DB_PASSWORD:?missing}
      USER_PAYMENT_SERVICE_BASE_URL: ${USER_PAYMENT_SERVICE_BASE_URL_DOCKER:-http://shiori-payment-service}
      PRODUCT_DB_URL: ${PRODUCT_DB_URL_DOCKER:-jdbc:mysql://mysql:3306/shiori_product?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
      PRODUCT_DB_USERNAME: ${PRODUCT_DB_USERNAME:?missing}
      PRODUCT_DB_PASSWORD: ${PRODUCT_DB_PASSWORD:?missing}
      ORDER_DB_URL: ${ORDER_DB_URL_DOCKER:-jdbc:mysql://mysql:3306/shiori_order?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
      ORDER_DB_USERNAME: ${ORDER_DB_USERNAME:?missing}
      ORDER_DB_PASSWORD: ${ORDER_DB_PASSWORD:?missing}
      PAYMENT_DB_URL: ${PAYMENT_DB_URL_DOCKER:-jdbc:mysql://mysql:3306/shiori_payment?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
      PAYMENT_DB_USERNAME: ${PAYMENT_DB_USERNAME:?missing}
      PAYMENT_DB_PASSWORD: ${PAYMENT_DB_PASSWORD:?missing}
      SOCIAL_DB_URL: ${SOCIAL_DB_URL_DOCKER:-jdbc:mysql://mysql:3306/shiori_social?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
      SOCIAL_DB_USERNAME: ${SOCIAL_DB_USERNAME:?missing}
      SOCIAL_DB_PASSWORD: ${SOCIAL_DB_PASSWORD:?missing}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS_DOCKER:-kafka:29092}
      PRODUCT_SEARCH_ENABLED: ${PRODUCT_SEARCH_ENABLED:-true}
      PRODUCT_SEARCH_ENDPOINT: ${PRODUCT_SEARCH_ENDPOINT_DOCKER:-http://elasticsearch:9200}
      PRODUCT_SEARCH_INDEX_NAME: ${PRODUCT_SEARCH_INDEX_NAME:-shiori_product_search}
      PRODUCT_SEARCH_CONNECT_TIMEOUT: ${PRODUCT_SEARCH_CONNECT_TIMEOUT:-1000}
      PRODUCT_SEARCH_READ_TIMEOUT: ${PRODUCT_SEARCH_READ_TIMEOUT:-1500}
      PRODUCT_SEARCH_MYSQL_FALLBACK_ENABLED: ${PRODUCT_SEARCH_MYSQL_FALLBACK_ENABLED:-true}
      SEARCH_KAFKA_ENABLED: ${SEARCH_KAFKA_ENABLED:-true}
      SEARCH_PRODUCT_OUTBOX_TOPIC: ${SEARCH_PRODUCT_OUTBOX_TOPIC:-shiori.cdc.product.outbox.raw}
      SEARCH_PRODUCT_OUTBOX_GROUP_ID: ${SEARCH_PRODUCT_OUTBOX_GROUP_ID:-shiori-search-indexer}
      SEARCH_ELASTICSEARCH_ENDPOINT: ${SEARCH_ELASTICSEARCH_ENDPOINT_DOCKER:-http://elasticsearch:9200}
      SEARCH_ELASTICSEARCH_INDEX_NAME: ${SEARCH_ELASTICSEARCH_INDEX_NAME:-shiori_product_search}
      TRACING_ENABLED: ${TRACING_ENABLED:-true}
      TRACING_SAMPLING_PROBABILITY: ${TRACING_SAMPLING_PROBABILITY:-1.0}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT_DOCKER:-http://jaeger:4318/v1/traces}
      REDIS_HOST: ${REDIS_HOST_DOCKER:-redis}
      REDIS_PORT: ${REDIS_PORT_DOCKER:-6379}
      NOTIFY_HTTP_ADDR: ${NOTIFY_HTTP_ADDR:-:8090}
      NOTIFY_WS_PATH: ${NOTIFY_WS_PATH:-/ws}
      NOTIFY_CHAT_ENABLED: ${NOTIFY_CHAT_ENABLED:-false}
      NOTIFY_CHAT_DEFAULT_LIMIT: ${NOTIFY_CHAT_DEFAULT_LIMIT:-20}
      NOTIFY_CHAT_MAX_LIMIT: ${NOTIFY_CHAT_MAX_LIMIT:-100}
      NOTIFY_CHAT_PUBSUB_ENABLED: ${NOTIFY_CHAT_PUBSUB_ENABLED:-true}
      NOTIFY_CHAT_PUBSUB_CHANNEL: ${NOTIFY_CHAT_PUBSUB_CHANNEL:-shiori.chat.event}
      NOTIFY_INSTANCE_ID: ${NOTIFY_INSTANCE_ID:-}
      NOTIFY_CHAT_TICKET_PUBLIC_KEY_PEM_BASE64: ${NOTIFY_CHAT_TICKET_PUBLIC_KEY_PEM_BASE64:-}
      NOTIFY_MYSQL_DSN: ${NOTIFY_DB_USERNAME:?missing}:${NOTIFY_DB_PASSWORD:?missing}@tcp(${NOTIFY_DB_HOST_DOCKER:-mysql}:${NOTIFY_DB_PORT_DOCKER:-3306})/${NOTIFY_DB_NAME_DOCKER:-shiori_notify}?charset=utf8mb4&parseTime=true&loc=UTC
      NOTIFY_REDIS_ADDR: ${REDIS_HOST_DOCKER:-redis}:${REDIS_PORT_DOCKER:-6379}
      PRODUCT_OSS_ENDPOINT: ${PRODUCT_OSS_ENDPOINT_DOCKER:-http://minio:9000}
      ORDER_PRODUCT_SERVICE_BASE_URL: ${ORDER_PRODUCT_SERVICE_BASE_URL_DOCKER:-http://shiori-product-service}
      ORDER_USER_SERVICE_BASE_URL: ${ORDER_USER_SERVICE_BASE_URL_DOCKER:-http://shiori-user-service}
      ORDER_PAYMENT_SERVICE_BASE_URL: ${ORDER_PAYMENT_SERVICE_BASE_URL_DOCKER:-http://shiori-payment-service}
      ORDER_NOTIFY_SERVICE_BASE_URL: ${ORDER_NOTIFY_SERVICE_BASE_URL_DOCKER:-http://shiori-notify-service}
      SECURITY_AUTHZ_USER_SERVICE_BASE_URL: ${SECURITY_AUTHZ_USER_SERVICE_BASE_URL_DOCKER:-http://shiori-user-service}
      ORDER_PAYMENT_INTERNAL_TOKEN: ${ORDER_PAYMENT_INTERNAL_TOKEN:?missing}
      MINIO_PRODUCT_BUCKET: ${MINIO_PRODUCT_BUCKET:-shiori-product}
      MINIO_PRODUCT_ACCESS_KEY: ${MINIO_PRODUCT_ACCESS_KEY:?missing}
      MINIO_PRODUCT_SECRET_KEY: ${MINIO_PRODUCT_SECRET_KEY:?missing}
      JWT_HMAC_SECRET: ${JWT_HMAC_SECRET:?missing}
      GATEWAY_SIGN_SECRET: ${GATEWAY_SIGN_SECRET:?missing}
      CHAT_TICKET_ISSUER: ${CHAT_TICKET_ISSUER:-shiori-chat-ticket}
      CHAT_TICKET_TTL_SECONDS: ${CHAT_TICKET_TTL_SECONDS:-300}
      CHAT_TICKET_KID: ${CHAT_TICKET_KID:-chat-ticket-kid}
      CHAT_TICKET_PRIVATE_KEY_PEM_BASE64: ${CHAT_TICKET_PRIVATE_KEY_PEM_BASE64:-}
    volumes:
      - ./nacos:/deploy/nacos:ro
    entrypoint: ["/bin/sh", "/deploy/nacos/import-nacos-configs.sh"]
    restart: "no"
    networks:
      - shiori-net

  nacos-config-init-local:
    image: curlimages/curl:8.12.1
    container_name: shiori-nacos-config-init-local
    depends_on:
      nacos:
        condition: service_started
    environment:
      NACOS_URL: http://nacos:8848
      SHIORI_ENV: dev
      NACOS_CONFIG_GROUP: ${NACOS_CONFIG_GROUP_LOCAL:-SHIORI_DEV_LOCAL}
      NACOS_CONFIG_NAMESPACE: ${NACOS_CONFIG_NAMESPACE:-}
      NACOS_IMPORT_USERNAME: ${NACOS_IMPORT_USERNAME:?missing}
      NACOS_IMPORT_PASSWORD: ${NACOS_IMPORT_PASSWORD:?missing}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY:?missing}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE:?missing}
      USER_DB_URL: ${USER_DB_URL_LOCAL:-jdbc:mysql://127.0.0.1:3306/shiori_user?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
      USER_DB_USERNAME: ${USER_DB_USERNAME:?missing}
      USER_DB_PASSWORD: ${USER_DB_PASSWORD:?missing}
      USER_PAYMENT_SERVICE_BASE_URL: ${USER_PAYMENT_SERVICE_BASE_URL_LOCAL:-http://127.0.0.1:8084}
      PRODUCT_DB_URL: ${PRODUCT_DB_URL_LOCAL:-jdbc:mysql://127.0.0.1:3306/shiori_product?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
      PRODUCT_DB_USERNAME: ${PRODUCT_DB_USERNAME:?missing}
      PRODUCT_DB_PASSWORD: ${PRODUCT_DB_PASSWORD:?missing}
      ORDER_DB_URL: ${ORDER_DB_URL_LOCAL:-jdbc:mysql://127.0.0.1:3306/shiori_order?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
      ORDER_DB_USERNAME: ${ORDER_DB_USERNAME:?missing}
      ORDER_DB_PASSWORD: ${ORDER_DB_PASSWORD:?missing}
      PAYMENT_DB_URL: ${PAYMENT_DB_URL_LOCAL:-jdbc:mysql://127.0.0.1:3306/shiori_payment?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
      PAYMENT_DB_USERNAME: ${PAYMENT_DB_USERNAME:?missing}
      PAYMENT_DB_PASSWORD: ${PAYMENT_DB_PASSWORD:?missing}
      SOCIAL_DB_URL: ${SOCIAL_DB_URL_LOCAL:-jdbc:mysql://127.0.0.1:3306/shiori_social?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
      SOCIAL_DB_USERNAME: ${SOCIAL_DB_USERNAME:?missing}
      SOCIAL_DB_PASSWORD: ${SOCIAL_DB_PASSWORD:?missing}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS_LOCAL:-127.0.0.1:9092}
      PRODUCT_SEARCH_ENABLED: ${PRODUCT_SEARCH_ENABLED:-true}
      PRODUCT_SEARCH_ENDPOINT: ${PRODUCT_SEARCH_ENDPOINT_LOCAL:-http://127.0.0.1:9200}
      PRODUCT_SEARCH_INDEX_NAME: ${PRODUCT_SEARCH_INDEX_NAME:-shiori_product_search}
      PRODUCT_SEARCH_CONNECT_TIMEOUT: ${PRODUCT_SEARCH_CONNECT_TIMEOUT:-1000}
      PRODUCT_SEARCH_READ_TIMEOUT: ${PRODUCT_SEARCH_READ_TIMEOUT:-1500}
      PRODUCT_SEARCH_MYSQL_FALLBACK_ENABLED: ${PRODUCT_SEARCH_MYSQL_FALLBACK_ENABLED:-true}
      SEARCH_KAFKA_ENABLED: ${SEARCH_KAFKA_ENABLED:-true}
      SEARCH_PRODUCT_OUTBOX_TOPIC: ${SEARCH_PRODUCT_OUTBOX_TOPIC:-shiori.cdc.product.outbox.raw}
      SEARCH_PRODUCT_OUTBOX_GROUP_ID: ${SEARCH_PRODUCT_OUTBOX_GROUP_ID:-shiori-search-indexer}
      SEARCH_ELASTICSEARCH_ENDPOINT: ${SEARCH_ELASTICSEARCH_ENDPOINT_LOCAL:-http://127.0.0.1:9200}
      SEARCH_ELASTICSEARCH_INDEX_NAME: ${SEARCH_ELASTICSEARCH_INDEX_NAME:-shiori_product_search}
      TRACING_ENABLED: ${TRACING_ENABLED:-true}
      TRACING_SAMPLING_PROBABILITY: ${TRACING_SAMPLING_PROBABILITY:-1.0}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT_LOCAL:-http://127.0.0.1:4318/v1/traces}
      REDIS_HOST: ${REDIS_HOST_LOCAL:-127.0.0.1}
      REDIS_PORT: ${REDIS_PORT_LOCAL:-6379}
      NOTIFY_HTTP_ADDR: ${NOTIFY_HTTP_ADDR:-:8090}
      NOTIFY_WS_PATH: ${NOTIFY_WS_PATH:-/ws}
      NOTIFY_CHAT_ENABLED: ${NOTIFY_CHAT_ENABLED:-false}
      NOTIFY_CHAT_DEFAULT_LIMIT: ${NOTIFY_CHAT_DEFAULT_LIMIT:-20}
      NOTIFY_CHAT_MAX_LIMIT: ${NOTIFY_CHAT_MAX_LIMIT:-100}
      NOTIFY_CHAT_PUBSUB_ENABLED: ${NOTIFY_CHAT_PUBSUB_ENABLED:-true}
      NOTIFY_CHAT_PUBSUB_CHANNEL: ${NOTIFY_CHAT_PUBSUB_CHANNEL:-shiori.chat.event}
      NOTIFY_INSTANCE_ID: ${NOTIFY_INSTANCE_ID:-}
      NOTIFY_CHAT_TICKET_PUBLIC_KEY_PEM_BASE64: ${NOTIFY_CHAT_TICKET_PUBLIC_KEY_PEM_BASE64:-}
      NOTIFY_MYSQL_DSN: ${NOTIFY_DB_USERNAME:?missing}:${NOTIFY_DB_PASSWORD:?missing}@tcp(${NOTIFY_DB_HOST_LOCAL:-127.0.0.1}:${NOTIFY_DB_PORT_LOCAL:-3306})/${NOTIFY_DB_NAME_LOCAL:-shiori_notify}?charset=utf8mb4&parseTime=true&loc=UTC
      NOTIFY_REDIS_ADDR: ${REDIS_HOST_LOCAL:-127.0.0.1}:${REDIS_PORT_LOCAL:-6379}
      PRODUCT_OSS_ENDPOINT: ${PRODUCT_OSS_ENDPOINT_LOCAL:-http://127.0.0.1:9000}
      ORDER_PRODUCT_SERVICE_BASE_URL: ${ORDER_PRODUCT_SERVICE_BASE_URL_LOCAL:-http://127.0.0.1:8082}
      ORDER_USER_SERVICE_BASE_URL: ${ORDER_USER_SERVICE_BASE_URL_LOCAL:-http://127.0.0.1:8081}
      ORDER_PAYMENT_SERVICE_BASE_URL: ${ORDER_PAYMENT_SERVICE_BASE_URL_LOCAL:-http://127.0.0.1:8084}
      ORDER_NOTIFY_SERVICE_BASE_URL: ${ORDER_NOTIFY_SERVICE_BASE_URL_LOCAL:-http://127.0.0.1:8090}
      SECURITY_AUTHZ_USER_SERVICE_BASE_URL: ${SECURITY_AUTHZ_USER_SERVICE_BASE_URL_LOCAL:-http://127.0.0.1:8081}
      ORDER_PAYMENT_INTERNAL_TOKEN: ${ORDER_PAYMENT_INTERNAL_TOKEN:?missing}
      MINIO_PRODUCT_BUCKET: ${MINIO_PRODUCT_BUCKET:-shiori-product}
      MINIO_PRODUCT_ACCESS_KEY: ${MINIO_PRODUCT_ACCESS_KEY:?missing}
      MINIO_PRODUCT_SECRET_KEY: ${MINIO_PRODUCT_SECRET_KEY:?missing}
      JWT_HMAC_SECRET: ${JWT_HMAC_SECRET:?missing}
      GATEWAY_SIGN_SECRET: ${GATEWAY_SIGN_SECRET:?missing}
      CHAT_TICKET_ISSUER: ${CHAT_TICKET_ISSUER:-shiori-chat-ticket}
      CHAT_TICKET_TTL_SECONDS: ${CHAT_TICKET_TTL_SECONDS:-300}
      CHAT_TICKET_KID: ${CHAT_TICKET_KID:-chat-ticket-kid}
      CHAT_TICKET_PRIVATE_KEY_PEM_BASE64: ${CHAT_TICKET_PRIVATE_KEY_PEM_BASE64:-}
    volumes:
      - ./nacos:/deploy/nacos:ro
    entrypoint: ["/bin/sh", "/deploy/nacos/import-nacos-configs.sh"]
    restart: "no"
    networks:
      - shiori-net

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: shiori-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?missing}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?missing}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - shiori-net

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
    container_name: shiori-minio-init
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?missing}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?missing}
      MINIO_PRODUCT_BUCKET: ${MINIO_PRODUCT_BUCKET:-shiori-product}
      MINIO_PRODUCT_ACCESS_KEY: ${MINIO_PRODUCT_ACCESS_KEY:?missing}
      MINIO_PRODUCT_SECRET_KEY: ${MINIO_PRODUCT_SECRET_KEY:?missing}
    entrypoint:
      - /bin/sh
      - -c
      - |
        i=0
        until /usr/bin/mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" >/dev/null 2>&1; do
          i=$$((i + 1))
          if [ "$$i" -ge 60 ]; then
            echo "minio-init: 等待 MinIO 就绪超时"
            exit 1
          fi
          sleep 2
        done
        /usr/bin/mc mb --ignore-existing "local/$${MINIO_PRODUCT_BUCKET}"
        /usr/bin/mc anonymous set none "local/$${MINIO_PRODUCT_BUCKET}"
        cat >/tmp/policy-product-rw.json <<EOF
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Action": [
                "s3:GetObject",
                "s3:PutObject",
                "s3:DeleteObject",
                "s3:ListBucket"
              ],
              "Resource": [
                "arn:aws:s3:::$${MINIO_PRODUCT_BUCKET}",
                "arn:aws:s3:::$${MINIO_PRODUCT_BUCKET}/*"
              ]
            }
          ]
        }
        EOF
        /usr/bin/mc admin policy create local shiori-product-rw /tmp/policy-product-rw.json || true
        /usr/bin/mc admin user add local "$${MINIO_PRODUCT_ACCESS_KEY}" "$${MINIO_PRODUCT_SECRET_KEY}" || true
        /usr/bin/mc admin policy attach local shiori-product-rw --user "$${MINIO_PRODUCT_ACCESS_KEY}"
        exit 0
    restart: "no"
    networks:
      - shiori-net

  shiori-user-service:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: shiori-java/shiori-user-service/Dockerfile
    container_name: shiori-user-service
    environment:
      NACOS_ADDR: nacos:8848
