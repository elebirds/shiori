      dockerfile: shiori-notify/Dockerfile
    container_name: shiori-notify-service
    environment:
      NACOS_ADDR: nacos:8848
      NACOS_USERNAME: ${NACOS_IMPORT_USERNAME:?missing}
      NACOS_PASSWORD: ${NACOS_IMPORT_PASSWORD:?missing}
      NACOS_CONFIG_GROUP: ${NACOS_CONFIG_GROUP:-SHIORI_DEV_DOCKER}
      NACOS_CONFIG_NAMESPACE: ${NACOS_CONFIG_NAMESPACE:-}
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started
      nacos:
        condition: service_started
      nacos-config-init:
        condition: service_completed_successfully
    ports:
      - "8090:8090"
    restart: unless-stopped
    networks:
      - shiori-net

  shiori-app:
    profiles: ["web"]
    build:
      context: ..
      dockerfile: shiori-app/Dockerfile
      args:
        VITE_API_BASE_URL: /
        VITE_NOTIFY_WS_BASE_URL: /ws
    container_name: shiori-app
    depends_on:
      - shiori-gateway-service
      - shiori-notify-service
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - shiori-net

  shiori-admin-web:
    profiles: ["web"]
    build:
      context: ..
      dockerfile: shiori-admin-web/Dockerfile
      args:
        VITE_API_BASE_URL: /
    container_name: shiori-admin-web
    depends_on:
      - shiori-gateway-service
    ports:
      - "3001:80"
    restart: unless-stopped
    networks:
      - shiori-net

  prometheus:
    profiles: ["obs"]
    image: prom/prometheus:v2.54.1
    container_name: shiori-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped
    networks:
      - shiori-net

  grafana:
    profiles: ["obs"]
    image: grafana/grafana:10.4.5
    container_name: shiori-grafana
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "${GRAFANA_HOST_PORT:-3002}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped
    networks:
      - shiori-net

  jaeger:
    profiles: ["app", "obs"]
    image: jaegertracing/all-in-one:1.67.0
    container_name: shiori-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_HOST_PORT:-16686}:16686"
      - "${JAEGER_OTLP_GRPC_HOST_PORT:-4317}:4317"
      - "${JAEGER_OTLP_HTTP_HOST_PORT:-4318}:4318"
    restart: unless-stopped
    networks:
      - shiori-net

networks:
  shiori-net:
    driver: bridge

volumes:
  mysql-data:
  kafka-data:
  minio-data:
  elasticsearch-data:
  prometheus-data:
  grafana-data:
